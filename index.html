<!DOCTYPE html>
<html>
<head>

<title>Para Dania ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(#ff9a9e,#fad0c4);
text-align:center;
overflow:hidden;
}

h1{
color:white;
font-size:50px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
}

#mensaje{
font-size:28px;
color:white;
margin-top:20px;
max-width:600px;
}

.corazon{
position:absolute;
color:red;
font-size:20px;
animation:caer 5s linear infinite;
}

@keyframes caer{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<h1>Para Ti ❤️</h1>

<p>Presiona el botón para ver mi sorpresa</p>

<button onclick="mostrarMensaje()">Haz clic aquí</button>

<p id="mensaje"></p>

<script>

function mostrarMensaje(){

document.getElementById("mensaje").innerHTML =
"💖 Feliz 2 meses de aniversario Dania 💖<br><br>" +
"Gracias por estos hermosos meses a tu lado. " +
"Desde que llegaste a mi vida todo es más bonito. " +
"Eres una persona muy especial para mí y espero que sigamos creando muchos recuerdos juntos. ❤️";

}

function crearCorazon(){

let corazon=document.createElement("div");
corazon.classList.add("corazon");

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},5000);

}

setInterval(crearCorazon,300);

</script>

</body>
</html>
